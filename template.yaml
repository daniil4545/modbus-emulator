# template.yaml — тестовый конфиг для go-modbus2mqtt
#
# 6 регистров: все reg_type, форматы, byte_order, writeable, sim, event
# Справочник полей и примеры: template.example.yaml

test_device:
  port_type: modbus_tcp
  ip: 127.0.0.1
  port: 15020
  slave_id: 1
  count: 1
  sim_tick: 2.0
  timeout: 1
  poll_time: 5
  registers:

    # [holding] int, 1 word, big-endian — baseline
    # bit: 5 → бит 5 = 1 (42 = 0b101010), тест bit-extraction на стороне драйвера
    - id: status_word
      reg_type: holding
      address: 0
      reg_size: 1
      format: int
      test_value: 42
      byte_order: big-endian
      scale: 1
      truncate: 0
      writeable: 0

    # [holding] float, 2 words, little-endian, writable — тест word-swap + запись
    - id: setpoint_float
      reg_type: holding
      address: 2
      reg_size: 2
      format: float
      test_value: 99.9
      byte_order: little-endian
      scale: 1
      truncate: 1
      writeable: 1

    # [holding] uint, 1 word, scale=0.1, event — тест дробного scale + event-публикации
    - id: counter
      reg_type: holding
      address: 4
      reg_size: 1
      format: uint
      test_value: 1000
      byte_order: big-endian
      scale: 0.1
      truncate: 1
      writeable: 0
      event: 1

    # [input] float, 2 words, sim:sine — тест динамического обновления
    - id: temperature
      reg_type: input
      address: 0
      reg_size: 2
      format: float
      test_value: 25.0
      byte_order: big-endian
      scale: 1
      truncate: 2
      writeable: 0
      sim:
        type: sine
        min: 20.0
        max: 30.0
        period: 30

    # [coil] bool, writable — тест 1-bit регистра с записью
    - id: output_enable
      reg_type: coil
      address: 0
      test_value: 1
      writeable: 1

    # [discrete] bool, read-only, event — тест 1-bit read-only + event
    - id: fault_flag
      reg_type: discrete
      address: 1
      test_value: 0
      event: 1
