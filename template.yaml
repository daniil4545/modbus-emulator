# template.yaml — шаблон устройств для modbus-emulator
#
# count: N — создать N копий устройства
#   имена:    name_01 .. name_N
#   port:     base_port + i  (только для tcp / modbus tcp; у serial нет port)
#   slave_id: base_slave_id + i
#
# count: 1 (по умолчанию) — устройство остаётся под исходным именем

tcp_sensor:
  port_type: modbus tcp  # modbus tcp | tcp (RTU-over-TCP) | serial
  ip: 127.0.0.1
  port: 15020            # стартовый порт; +i для каждой копии при count > 1
  slave_id: 1            # стартовый slave_id; +i для каждой копии
  count: 2               # → tcp_sensor_01 (port=15020) и tcp_sensor_02 (port=15021)
  sim_tick: 1.0          # интервал обновления sim-регистров в секундах
  registers:

    # Статический holding-регистр, доступный для записи драйвером
    - reg_type: holding  # holding | input | coil | discrete
      address: 0
      reg_size: 1        # 1=16bit, 2=32bit, 4=64bit; для coil/discrete всегда 1
      format: uint       # uint | int | float; для coil/discrete не указывается
      test_value: 100
      writeable: true    # флаг для драйвера; протокол Modbus всегда разрешает запись в holding

    # Динамический input-регистр с симуляцией синуса
    - reg_type: input
      address: 0
      reg_size: 2
      format: float
      test_value: 25.0
      sim:
        type: sine       # sine | ramp | step | random_walk
        min: 20.0
        max: 30.0
        period: 60       # период в секундах

    # Holding float с little-endian word order (low word first)
    - reg_type: holding
      address: 2
      reg_size: 2
      format: float
      test_value: 99.9
      byte_order: little-endian

    # Writable coil (одноbitный регистр, значение 0 или 1)
    - reg_type: coil
      address: 0
      test_value: 1
      writeable: true

    # Статический discrete input (read-only однобитный регистр)
    - reg_type: discrete
      address: 0
      test_value: 0

rtu_controller:
  port_type: tcp         # RTU-over-TCP: RTU-фрейминг поверх TCP-соединения
  ip: 127.0.0.1
  port: 15030
  slave_id: 10
  count: 1
  registers:
    - reg_type: holding
      address: 0
      reg_size: 1
      format: uint
      test_value: 500

serial_meter:
  port_type: serial      # serial RTU через PTY-пару (os.openpty); port не нужен
  slave_id: 20
  baud_rate: 9600
  parity: "N"            # N | E | O
  data_bits: 8
  stop_bits: 1
  count: 1
  registers:
    - reg_type: holding
      address: 0
      reg_size: 1
      format: uint
      test_value: 999
